apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-backend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-backend
                port:
                  number: 8000
  tls:
    - secretName: demo-backend-tls
      hosts:
        - api.example.com
